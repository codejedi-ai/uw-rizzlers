[build]
  publish = "dist"
  command = "npm run build && npm run build:functions"
  functions = "netlify/functions/dist"

[[redirects]]
  from = "/hello/*"
  to = "/.netlify/functions/hello"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200